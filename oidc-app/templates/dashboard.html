<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>
    <h1>✅ Zalogowano pomyślnie</h1>

    <h3>Dane użytkownika:</h3>

        <li><b>Login:</b> {{ user.preferred_username }}</li>

    <a href="/logout">

</html>
